name: Deploy Blazor Wasm to Vercel

# Controls when the workflow will run
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Ensure only one deployment runs at a time to avoid conflicts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the latest code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Initialize .NET Environment
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 3. Handle Dependencies and Build
      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      # 4. Compile the Wasm Project for Production
      - name: Publish WasmApp
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: dotnet publish PrelineBlazorWasmApp/PrelineBlazorWasmApp.csproj -c Release -o publish_output

      - name: List Output Contents
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: ls -R publish_output

      # 4.5 Fix Blazor WASM Fingerprinting (Manual Copy)
      # This ensures that even if fingerprinting is active, 
      # the non-fingerprinted file names expected by the browser are present.
      - name: Fix Blazor WASM Fingerprinting
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          cd publish_output/wwwroot/_framework
          # Function to copy fingerprinted file to its base name
          fix_file() {
            pattern=$1
            target=$2
            # Use find to get the file (handles cases where glob might fail)
            file=$(find . -maxdepth 1 -name "$pattern" | head -n 1)
            if [ -n "$file" ]; then
              cp "$file" "$target"
              echo "Mapped $file -> $target"
            else
              echo "Warning: No file found matching $pattern"
            fi
          }
          fix_file "blazor.webassembly.*.js" "blazor.webassembly.js"
          fix_file "dotnet.*.js" "dotnet.js"
          fix_file "dotnet.native.*.js" "dotnet.native.js"
          fix_file "dotnet.runtime.*.js" "dotnet.runtime.js"
          echo "Non-fingerprinted clones created."

      # 5. Push to Vercel
      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-version: latest
          vercel-args: '--prod'
          working-directory: ./publish_output/wwwroot # Vercel needs the static assets folder
